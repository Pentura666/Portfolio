<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Igor Nikitchenko</title>
  <meta name="description" content="Photo gallery — Igor Nikitchenko Lighting Designer" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .gallery-masonry {
      columns: 3;
      column-gap: 8px;
    }
    .gallery-masonry-item {
      break-inside: avoid;
      margin-bottom: 8px;
      border-radius: 4px;
      overflow: hidden;
      background: #111;
      display: block;
    }
    .gallery-masonry-item img {
      width: 100%;
      display: block;
      transition: transform 0.3s;
    }
    .gallery-masonry-item:hover img {
      transform: scale(1.03);
    }
    .gallery-loading {
      text-align: center;
      color: var(--text-muted, #888);
      padding: 60px 0;
      font-size: 14px;
    }
    @media (max-width: 900px) {
      .gallery-masonry { columns: 2; }
    }
    @media (max-width: 500px) {
      .gallery-masonry { columns: 1; }
    }
  </style>
  <script data-goatcounter="https://pntrlcht.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<nav>
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">PNTR.LCHT</a>
    <button class="nav-toggle" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="press.html">Press</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>Gallery</h1>
    <p>Photography from productions and installations</p>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="gallery-masonry" id="gallery"></div>
    <div class="gallery-loading" id="gallery-loading">Loading photos...</div>
  </div>
</section>

<footer>
  <div class="container">
    <p>&copy; 2026 Igor Nikitchenko. All rights reserved.</p>
  </div>
</footer>

<script>
(function() {
  var gallery = document.getElementById('gallery');
  var loading = document.getElementById('gallery-loading');
  var repo = 'Pentura666/Portfolio';
  var folder = 'photos';
  var imageExts = ['jpg', 'jpeg', 'png', 'webp', 'gif'];

  fetch('https://api.github.com/repos/' + repo + '/contents/' + folder)
    .then(function(r) { return r.json(); })
    .then(function(files) {
      loading.style.display = 'none';
      files
        .filter(function(f) {
          var ext = f.name.split('.').pop().toLowerCase();
          return imageExts.indexOf(ext) !== -1;
        })
        .sort(function(a, b) { return a.name.localeCompare(b.name); })
        .forEach(function(f) {
          var item = document.createElement('div');
          item.className = 'gallery-masonry-item';
          var img = document.createElement('img');
          img.src = 'photos/' + f.name;
          img.alt = f.name;
          img.loading = 'lazy';
          item.appendChild(img);
          gallery.appendChild(item);
        });
    })
    .catch(function() {
      loading.textContent = 'Could not load gallery.';
    });
})();
document.addEventListener('click', function(e) {
  var nav = document.querySelector('.nav-links');
  var toggle = document.querySelector('.nav-toggle');
  if (nav.classList.contains('open') && !nav.contains(e.target) && !toggle.contains(e.target)) {
    nav.classList.remove('open');
  }
});
</script>

</body>
</html>
